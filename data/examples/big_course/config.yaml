output_language: ru
include_summary: true
relation_types:
  - useful_repetition
  - probable_duplication
  - probable_gap
llm:
  provider: mock
  model: gpt-5.4-mini
  temperature: 0.0
  timeout_seconds: 180
  debug: false
  output_language: ru
  prompt_template: strict_evidence_analysis_prompt.md
  api_key_file: LLM_apikey/openai-key.txt
  api_base_url: https://api.openai.com/v1
preprocessing:
  enabled: true
  analysis_mode: smart_batch
  write_intermediate_outputs: true
  chunking:
    enabled: true
    strategy: educational_entities
    sizing_mode: auto
    min_chunk_tokens: 300
    overlap_tokens: 80
    strict: false
    max_chunk_chars: 900
    max_pair_text_chars: 160
  retrieval:
    enabled: true
    mode: keyword
    top_k: 8
    fallback_mode: keyword
  batch:
    max_skills_per_batch: 1
    max_chunks_per_skill: 6
    max_assessment_chunks_per_skill: 4
    max_batch_input_tokens: 9000
    include_course_profile: true
    merge_strategy: local_dedup
  embeddings:
    enabled: false
    provider: local_sentence_transformer
    model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    local_files_only: true
  token_budget:
    enabled: true
    max_input_tokens: 13000
    reserve_output_tokens: 1500
