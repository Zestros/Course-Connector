id: data_literacy_basics
title: Основы аналитики данных
modules:
  - id: module_01
    title: Таблицы и типы данных
    description: Студенты читают CSV-файлы, различают числовые и категориальные признаки и фиксируют пропуски.
    skills:
      - data_table_reading
      - data_types_missing
  - id: module_02
    title: Очистка и первичный анализ
    description: Студенты очищают данные, считают базовые метрики и формулируют вопросы для анализа.
    skills:
      - data_cleaning
      - exploratory_questions
  - id: module_03
    title: Короткий аналитический отчет
    description: Студенты собирают выводы в Markdown-отчет и объясняют ограничения данных.
    skills:
      - report_writing
      - result_explanation
learning_outcomes:
  - id: lo_01
    text: Читать небольшие CSV-таблицы и описывать структуру набора данных.
  - id: lo_02
    text: Находить пропуски, простые ошибки и выполнять базовую data_cleaning.
  - id: lo_03
    text: Формулировать exploratory_questions перед расчетом метрик.
  - id: lo_04
    text: Писать короткий отчет с выводами и ограничениями анализа.
assessments:
  - id: quiz_01
    title: Мини-тест по структуре данных
    checked_skills:
      - data_table_reading
      - data_types_missing
  - id: report_01
    title: Короткий отчет по учебному датасету
    checked_skills:
      - data_cleaning
      - report_writing
      - result_explanation
