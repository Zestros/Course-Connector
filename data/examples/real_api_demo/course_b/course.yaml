id: ml_project_starter
title: Введение в проект машинного обучения
modules:
  - id: module_01
    title: Подготовка датасета для модели
    description: Студенты повторяют чтение таблиц, очищают признаки и готовят train/test split.
    skills:
      - data_table_reading
      - data_cleaning
      - train_test_split
  - id: module_02
    title: Базовая модель и метрики
    description: Студенты обучают простую модель, выбирают metric_selection и сравнивают результаты.
    skills:
      - baseline_model
      - metric_selection
      - result_explanation
  - id: module_03
    title: Финальный проект
    description: Студенты оформляют проект, описывают ограничения модели и готовят воспроизводимый отчет.
    skills:
      - report_writing
      - model_limitations
      - experiment_tracking
learning_outcomes:
  - id: lo_01
    text: Подготовить очищенный датасет и выполнить train_test_split для эксперимента.
  - id: lo_02
    text: Объяснить выбор метрики качества и интерпретировать результат baseline_model.
  - id: lo_03
    text: Вести experiment_tracking и фиксировать параметры запуска.
  - id: lo_04
    text: Описывать model_limitations в финальном отчете.
assessments:
  - id: lab_01
    title: Лабораторная работа по подготовке данных
    checked_skills:
      - data_table_reading
      - data_cleaning
      - train_test_split
  - id: project_01
    title: Мини-проект с baseline моделью
    checked_skills:
      - baseline_model
      - metric_selection
      - experiment_tracking
      - model_limitations
