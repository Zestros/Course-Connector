skills:
  - id: data_table_reading
    title: Чтение табличных данных
    aliases:
      - CSV reading
      - чтение таблиц
    description: Умение открыть таблицу, понять строки, колонки и типы признаков.
  - id: data_types_missing
    title: Типы данных и пропуски
    aliases:
      - missing values
      - пропуски
    description: Определение типов признаков и базовая диагностика пропусков.
  - id: data_cleaning
    title: Очистка данных
    aliases:
      - data cleaning
      - подготовка данных
    description: Исправление простых ошибок, пропусков и несогласованных значений.
  - id: exploratory_questions
    title: Аналитические вопросы
    aliases:
      - EDA questions
    description: Формулирование вопросов перед анализом данных.
  - id: report_writing
    title: Аналитический отчет
    aliases:
      - report writing
      - Markdown report
    description: Подготовка короткого отчета с результатами и выводами.
  - id: result_explanation
    title: Объяснение результатов
    aliases:
      - interpretation
      - интерпретация
    description: Объяснение метрик, выводов и ограничений результата.
  - id: train_test_split
    title: Train/test split
    aliases:
      - разделение выборки
    description: Разделение данных для проверки модели.
  - id: baseline_model
    title: Базовая модель
    aliases:
      - baseline
    description: Обучение простой начальной модели для сравнения.
  - id: metric_selection
    title: Выбор метрики
    aliases:
      - metric selection
    description: Выбор метрики качества под задачу и данные.
  - id: experiment_tracking
    title: Учет экспериментов
    aliases:
      - experiment tracking
    description: Фиксация параметров и результатов запусков.
  - id: model_limitations
    title: Ограничения модели
    aliases:
      - model limitations
    description: Описание слабых мест модели, данных и метрик.
