id: course_a
title: Основы анализа учебных данных
description: Курс знакомит студентов с базовой обработкой данных, чтением таблиц и подготовкой короткого аналитического отчета.
topics:
  - Python basics
  - Data processing
  - Report generation
modules:
  - id: module_01
    title: Python basics
    description: Студенты используют базовый Python для чтения и первичной обработки данных.
    skills:
      - python_basics
  - id: module_02
    title: Data processing
    description: Студенты очищают данные и готовят их для краткого отчета.
    skills:
      - data_processing
learning_outcomes:
  - text: Читать простые наборы данных с помощью python_basics.
    skills:
      - python_basics
  - text: Готовить краткий аналитический отчет после data_processing.
    skills:
      - data_processing
competencies:
  - python_basics
  - data_processing
assessments:
  - id: report_01
    title: Мини-отчет по набору данных
    checked_skills:
      - data_processing
    evidence: Студент сдает Markdown-отчет с описанием обработки данных и выводами.
